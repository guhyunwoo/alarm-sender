spring:
  application:
    name: notification-api
  datasource:
    url: jdbc:postgresql://localhost:5432/alarm_sender
    username: alarm
    password: alarm
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO
    ggee.alarmsender: DEBUG
