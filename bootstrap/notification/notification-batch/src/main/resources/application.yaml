spring:
  application:
    name: notification-batch
  main:
    web-application-type: none
  datasource:
    url: jdbc:postgresql://localhost:5432/alarm_sender
    username: alarm
    password: alarm
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

notification:
  batch:
    reclaim-interval-ms: 5000

logging:
  level:
    ggee.alarmsender: DEBUG
