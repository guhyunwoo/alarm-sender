spring:
  application:
    name: notification-worker
  main:
    web-application-type: none
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:alarm_sender}
    username: ${POSTGRES_USER:alarm}
    password: ${POSTGRES_PASSWORD:alarm}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

notification:
  worker:
    poll-interval-ms: 1000
    batch-size: 20
    lease-duration-seconds: 30
    max-attempts: 5

logging:
  level:
    ggee.alarmsender: DEBUG
